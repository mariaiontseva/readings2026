  .opts{margin-top:9px;}

  .count{float:right;font-size:12.5px;color:var(--mut);padding-top:7px;}
  table{border-collapse:collapse;width:100%;margin-top:8px;}
  tr{border-bottom:1px solid var(--rule);}
  td{padding:8px;vertical-align:top;}
  .form{font-style:italic;font-weight:600;color:var(--accent);white-space:nowrap;font-size:16.5px;}
  .note{color:#555;white-space:nowrap;font-size:13px;}
  .tag{font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:#fff;border-radius:4px;padding:2px 7px;white-space:nowrap;}
  .mean{font-size:15px;color:#2a2620;}
  .hide-m .mean{color:transparent;background:var(--hl);border-radius:4px;cursor:pointer;}
  .hide-m .mean.show{color:#2a2620;background:transparent;cursor:default;}
  .grouphdr td{background:var(--vbg);font-weight:600;color:var(--accent);font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;padding:9px 8px;}

const MODES={v:{cat:VCAT,ord:VORD,data:VERBS,ph:'search… (e.g. bhū, attain, -tvā, should)'},
 n:{cat:NCAT,ord:NORD,data:NOUNS,ph:'search… (e.g. dharma, soul, body)'},
 i:{cat:ICAT,ord:IORD,data:INDECL,ph:'search… (e.g. therefore, hi, if)'}};

const tb=document.getElementById('tb'),chips=document.getElementById('chips'),
      q=document.getElementById('q'),count=document.getElementById('count');
let mode='v',cat='all',hide=false;
function M(){return MODES[mode];}
function buildChips(){
  chips.innerHTML='';const C=M().cat,counts={};M().data.forEach(v=>counts[v[1]]=(counts[v[1]]||0)+1);
  ['all',...M().ord].forEach(c=>{
    const b=document.createElement('button');b.className='chip'+(c===cat?' on':'');b.dataset.c=c;
    b.innerHTML=(c==='all'?'All':C[c].replace(/ \(.*/,''))+`<span class="n">${c==='all'?M().data.length:counts[c]||0}</span>`;
    b.onclick=()=>{cat=c;[...chips.children].forEach(x=>x.classList.toggle('on',x.dataset.c===c));render();};
    chips.appendChild(b);
  });
}
function render(){
  const s=q.value.trim().toLowerCase(),C=M().cat;tb.innerHTML='';let n=0,last=null;
  M().data.forEach(([form,c,note,mean])=>{
    if(cat!=='all'&&c!==cat)return;
    if(s&&!(form.toLowerCase().includes(s)||note.toLowerCase().includes(s)||mean.toLowerCase().includes(s)))return;
    if(c!==last){const h=document.createElement('tr');h.className='grouphdr';h.innerHTML=`<td colspan="4">${C[c]}</td>`;tb.appendChild(h);last=c;}
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="form">${form}</td><td><span class="tag ${TAGI[c]}">${c}</span></td><td class="note">${note}</td><td class="mean">${mean}</td>`;
    tb.appendChild(tr);n++;
  });
  count.textContent=n+' entries';document.body.classList.toggle('hide-m',hide);
}
function setMode(m){
  mode=m;cat='all';
  ['v','n','i'].forEach(k=>document.getElementById('m-'+k).classList.toggle('on',k===m));
  q.placeholder=M().ph;buildChips();render();
}
['v','n','i'].forEach(k=>document.getElementById('m-'+k).onclick=()=>setMode(k));
q.addEventListener('input',render);
document.getElementById('stoggle').onclick=function(){hide=!hide;this.classList.toggle('on',hide);
  this.textContent=hide?'👁 show meanings':'🙈 self-test (hide meanings)';render();};
tb.addEventListener('click',e=>{if(hide&&e.target.classList.contains('mean'))e.target.classList.toggle('show');});
setMode('v');
</script>
